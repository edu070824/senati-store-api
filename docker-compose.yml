yaml
version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: senati-store-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: senati_store
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - senati-network

  api:
    build: .
    container_name: senati-store-api
    restart: unless-stopped
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/senati_store
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    networks:
      - senati-network

volumes:
  mongodb_data:
    driver: local

networks:
  senati-network:
    driver: bridge
